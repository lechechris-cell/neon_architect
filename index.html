<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#030305">
    <title>NEON ARCHITECT: SONIC SHIFT EVOLUTION (PREMIUM EDITION)</title>
    <style>
        html {
            height: 100%;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
        }

        :root {
            --p: #00ffcc;
            --d: #ff0055;
            --bg: #030305;
            --p-glow: rgba(0, 255, 204, 0.4);
            --d-glow: rgba(255, 0, 85, 0.4);
            --bg-grid: rgba(255, 255, 255, 0.02);
            --skin-core: radial-gradient(circle, #ffffff 0%, #00ffcc 70%);
            --matrix-glow: 0 0 20px var(--p);
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #020204;
            color: #fff;
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            width: 100%;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            width: 95vw;
            max-width: 960px;
            height: 95vh;
            max-height: 540px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 40px var(--p-glow);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            touch-action: none;
        }

        #engine-layer {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0c0f1d 0%, #020205 100%);
            overflow: hidden;
        }

        /* Background Visual Layers */
        #bg-grid-layer {
            position: absolute;
            inset: -50px;
            background-image: 
                linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            transform: perspective(500px) rotateX(0deg);
        }

        #bg-parallax-stars {
            position: absolute;
            width: 2000px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Customizable Premium Skins */
        #player {
            position: absolute;
            width: 38px;
            height: 38px;
            left: 160px;
            bottom: 90px;
            z-index: 50;
            background: var(--skin-core);
            border: 2px solid #fff;
            border-radius: 8px;
            box-shadow: 0 0 30px var(--p), inset 0 0 10px rgba(255,255,255,0.9);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s linear, width 0.1s, height 0.1s, border-radius 0.2s;
        }

        /* Skin Tier Matrix Decorations */
        .skin-wing {
            position: absolute;
            width: 14px;
            height: 8px;
            background: var(--d);
            border: 1px solid #fff;
            box-shadow: 0 0 10px var(--d);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .skin-wing.left { left: -12px; transform: skewY(-20deg); border-radius: 4px 0 0 4px; }
        .skin-wing.right { right: -12px; transform: skewY(20deg); border-radius: 0 4px 4px 0; }

        .ship-mode .skin-wing { opacity: 1; }
        .ship-mode { border-radius: 50% 12px 12px 50% !important; height: 30px !important; }

        #player-aura {
            position: absolute;
            inset: -8px;
            border: 2px dashed var(--p);
            border-radius: 12px;
            opacity: 0.4;
            animation: auraSpin 4s linear infinite;
            pointer-events: none;
        }

        @keyframes auraSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #player-inner-core {
            position: absolute;
            inset: 6px;
            background: #000;
            border: 2px solid var(--p);
            border-radius: 4px;
            box-shadow: 0 0 12px var(--p);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-scanner {
            width: 80%;
            height: 3px;
            background: #fff;
            box-shadow: 0 0 8px #fff;
            animation: scanVertical 1.2s infinite alternate ease-in-out;
        }

        @keyframes scanVertical {
            0% { transform: translateY(-6px); }
            100% { transform: translateY(6px); }
        }

        /* Particle Infrastructure */
        .particle {
            position: absolute;
            background: #fff;
            pointer-events: none;
            border-radius: 50%;
            z-index: 45;
        }

        .trail-part {
            position: absolute;
            background: var(--p);
            pointer-events: none;
            border-radius: 6px;
            z-index: 15;
            box-shadow: 0 0 15px var(--p);
        }

        /* Environmental Structuring */
        .floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 90px;
            background: linear-gradient(to bottom, #0f1224 0%, #04050a 100%);
            border-top: 4px solid var(--p);
            box-shadow: 0 -8px 35px var(--p-glow);
            z-index: 80;
        }

        .floor-grid {
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 24px 100%;
        }

        .ceiling {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #04050a 0%, #0f1224 100%);
            border-bottom: 4px solid var(--p);
            box-shadow: 0 8px 35px var(--p-glow);
            z-index: 80;
            display: none;
        }

        /* Obstacles & Interactive Nodes */
        .obstacle {
            position: absolute;
            box-sizing: border-box;
            z-index: 40;
        }

        .spike {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid var(--d);
            filter: drop-shadow(0 0 10px var(--d));
        }

        .spike-down {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--d);
            filter: drop-shadow(0 0 10px var(--d));
        }

        .block {
            background: linear-gradient(135deg, #1b1f32 0%, #0c0d1a 100%);
            border: 2px solid #fff;
            box-shadow: inset 0 0 12px rgba(255,255,255,0.15), 0 0 20px rgba(0,0,0,0.7);
            border-radius: 6px;
        }

        .orb {
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #ffbb00 60%);
            box-shadow: 0 0 25px #ffbb00, inset 0 0 8px #fff;
        }

        .orb-dash {
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #00ff66 60%);
            box-shadow: 0 0 25px #00ff66, inset 0 0 8px #fff;
        }

        .portal {
            width: 36px;
            height: 110px;
            background: linear-gradient(to bottom, #00ffcc, #0077ff);
            border-radius: 18px;
            box-shadow: 0 0 30px #00ffcc, inset 0 0 10px #fff;
            opacity: 0.85;
            animation: elementPulse 0.5s infinite alternate ease-in-out;
        }

        .portal-cube {
            width: 36px;
            height: 110px;
            background: linear-gradient(to bottom, #ff0055, #ffaa00);
            border-radius: 18px;
            box-shadow: 0 0 30px #ff0055, inset 0 0 10px #fff;
            opacity: 0.85;
            animation: elementPulse 0.5s infinite alternate ease-in-out;
        }

        @keyframes elementPulse {
            from { transform: scale(0.93); opacity: 0.8; }
            to { transform: scale(1.07); opacity: 1; }
        }

        /* Boss Matrix Entity */
        #boss {
            position: absolute;
            right: -200px;
            bottom: 90px;
            width: 140px;
            height: 260px;
            background: linear-gradient(160deg, #ff0055 0%, #2a0010 50%, #000 100%);
            border: 4px solid #fff;
            border-radius: 16px;
            box-shadow: 0 0 60px var(--d), inset 0 0 20px rgba(255,255,255,0.2);
            display: none;
            z-index: 65;
            transition: top 0.1s ease-in-out, right 0.5s ease;
        }

        .boss-eye {
            position: absolute;
            top: 40px;
            left: 20px;
            width: 100px;
            height: 20px;
            background: #000;
            border: 2px solid var(--d);
            border-radius: 10px;
            overflow: hidden;
        }

        .boss-laser-core {
            width: 30px;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #ff0055;
            animation: bossScan 0.8s infinite alternate ease-in-out;
        }

        @keyframes bossScan {
            from { transform: translateX(0px); }
            to { transform: translateX(70px); }
        }

        .projectile {
            position: absolute;
            width: 24px;
            height: 8px;
            background: #fff;
            box-shadow: 0 0 15px #fff, 0 0 6px var(--d);
            border-radius: 4px;
            z-index: 60;
        }

        /* Heads Up Display System */
        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(10px, 3vw, 30px);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: clamp(8px, 2vw, 20px);
            z-index: 100;
            box-sizing: border-box;
            font-weight: bold;
            font-size: clamp(0.65rem, 2vw, 0.95rem);
            letter-spacing: 2px;
            text-shadow: 0 2px 5px #000, 0 0 10px rgba(0,0,0,0.5);
        }

        #stat-left, #stat-right {
            flex: 0 1 auto;
            white-space: nowrap;
            font-size: clamp(0.65rem, 1.5vw, 0.9rem);
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 150px;
            max-width: 400px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 5px rgba(0,0,0,0.8);
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--p) 0%, #fff 100%);
            width: 0%;
            box-shadow: 0 0 12px var(--p);
            transition: width 0.05s linear;
        }

        #progress-percent {
            font-size: clamp(0.6rem, 1.2vw, 0.8rem);
            color: #ccc;
        }

        #boss-hp-bar {
            position: absolute;
            top: auto;
            right: 30px;
            bottom: 120px;
            width: min(90%, 260px);
            height: 14px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            border-radius: 7px;
            display: none;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000 0%, var(--d) 100%);
            box-shadow: 0 0 15px var(--d);
            transition: width 0.1s ease;
        }

        /* Menu Overlay Ecosystem */
        #menu-overlay {
            position: absolute;
            inset: 0;
            background: rgba(3, 4, 8, 0.96);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: clamp(30px, 10vh, 60px);
            gap: clamp(20px, 8vw, 50px);
            padding-left: clamp(20px, 5vw, 40px);
            padding-right: clamp(20px, 5vw, 40px);
            padding-bottom: clamp(20px, 5vw, 40px);
            overflow-y: auto;
            transition: opacity 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .menu-title {
            font-size: clamp(2.2rem, 7vw, 3.5rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: clamp(5px, 1vw, 10px);
            margin: 0;
            padding: 20px 0;
            text-shadow: 0 0 30px var(--p), var(--matrix-glow);
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            flex-shrink: 0;
        }

        .menu-subtitle {
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #666;
            letter-spacing: clamp(2px, 0.5vw, 4px);
            text-transform: uppercase;
            margin: 0;
            text-align: center;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: clamp(12px, 3vw, 24px);
            width: 95%;
            max-width: 900px;
        }

        .lvl-btn {
            padding: clamp(10px, 2vw, 20px) clamp(8px, 1.5vw, 15px);
            border: 2px solid var(--p);
            background: rgba(10, 15, 30, 0.6);
            color: #fff;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 1, 0.2, 1);
            font-weight: bold;
            font-size: clamp(0.6rem, 1.5vw, 0.85rem);
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            min-width: 44px;
            min-height: 44px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            border-style: solid;
            font-family: inherit;
        }

        .lvl-btn:active,
        .lvl-btn:focus {
            outline: none;
            background: var(--p);
            color: #000;
            box-shadow: 0 0 30px var(--p);
        }

        .lvl-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .lvl-btn:hover::before { left: 100%; }

        .lvl-btn:hover {
            background: var(--p);
            color: #000;
            box-shadow: 0 0 30px var(--p);
            transform: translateY(-4px);
        }

        .instructions {
            margin-top: clamp(15px, 3vw, 40px);
            font-size: clamp(0.6rem, 1.2vw, 0.8rem);
            color: #444;
            text-align: center;
            line-height: 1.6;
            letter-spacing: 1px;
            max-width: 90%;
        }

        /* Performance Cosmetics Store & Custom Selection */
        #skin-shop-container {
            margin-top: clamp(15px, 3vw, 30px);
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .shop-label {
            font-size: clamp(0.6rem, 1.2vw, 0.8rem);
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .skin-node {
            width: clamp(24px, 5vw, 32px);
            height: clamp(24px, 5vw, 32px);
            border: 2px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        .skin-node:active,
        .skin-node:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 15px #fff;
            transform: scale(1.1);
        }

        .skin-node.active {
            border-color: #fff;
            box-shadow: 0 0 15px #fff;
            transform: scale(1.1);
        }

        /* Responsive Media Queries */
        @media (max-width: 768px) {
            #game-container {
                width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            #engine-layer {
                border-radius: 0;
            }

            #boss-hp-bar {
                top: auto;
                right: auto;
                bottom: calc(90px + 20px);
                left: 50%;
                transform: translateX(-50%);
                width: clamp(200px, 80%, 260px);
            }

            .hud {
                flex-direction: column;
                gap: 10px;
            }

            #stat-left, #stat-right {
                font-size: clamp(0.6rem, 1.2vw, 0.8rem);
            }

            .progress-container {
                width: 100%;
                min-width: auto;
            }
        }

        @media (max-width: 480px) {
            .btn-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            #menu-overlay {
                padding: 10px;
            }

            .instructions {
                font-size: clamp(0.55rem, 1vw, 0.7rem);
                line-height: 1.4;
            }

            .hud {
                padding: clamp(8px, 2vw, 15px);
                gap: 5px;
            }

            #stat-left, #stat-right {
                display: none;
            }

            .progress-container {
                width: 100%;
                gap: 5px;
            }
        }

        @media (orientation: portrait) and (max-height: 600px) {
            #menu-overlay {
                gap: 10px;
            }

            .btn-grid {
                gap: 8px;
            }

            .lvl-btn {
                padding: clamp(8px, 1.5vw, 15px) clamp(6px, 1vw, 10px);
                font-size: clamp(0.55rem, 1vw, 0.7rem);
            }
        }

        @media (orientation: portrait) {
            #game-container {
                width: 100%;
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
            }

            body {
                height: 100dvh;
            }
        }

        /* Touch-friendly adjustments */
        @media (hover: none) and (pointer: coarse) {
            .lvl-btn {
                padding: clamp(12px, 3vw, 20px) clamp(10px, 2vw, 15px);
                font-size: clamp(0.65rem, 1.8vw, 0.9rem);
                min-width: 50px;
                min-height: 50px;
            }

            .lvl-btn:active {
                background: var(--p);
                color: #000;
                box-shadow: 0 0 30px var(--p), inset 0 0 10px rgba(0,0,0,0.3);
                transform: scale(0.98);
            }

            .skin-node {
                width: clamp(32px, 8vw, 44px);
                height: clamp(32px, 8vw, 44px);
                min-width: 48px;
                min-height: 48px;
            }

            .skin-node:active {
                border-color: #fff;
                box-shadow: 0 0 15px #fff;
                transform: scale(1.15);
            }

            * {
                -webkit-user-select: none;
                user-select: none;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="engine-layer">
            <div id="bg-grid-layer"></div>
            <div id="bg-parallax-stars"></div>

            <!-- UI Navigation Overlay Matrix -->
            <div id="menu-overlay">
                <div class="menu-title">Neon Architect</div>
                <div class="menu-subtitle">SONIC SHIFT EVOLUTION</div>
                
                <div class="btn-grid">
                    <button class="lvl-btn" onclick="Engine.initLevel('NEON_GENESIS')">Neon Genesis<br><span style="color:#00ffcc;font-size:0.65rem">Easy - 130BPM</span></button>
                    <button class="lvl-btn" style="border-color:#7000ff" onclick="Engine.initLevel('SYNTH_WAVE')">Synth Wave<br><span style="color:#7000ff;font-size:0.65rem">Normal - 140BPM</span></button>
                    <button class="lvl-btn" style="border-color:#ff0055" onclick="Engine.initLevel('LASER_PULSE')">Laser Pulse<br><span style="color:#ff0055;font-size:0.65rem">Hard - 150BPM</span></button>
                    <button class="lvl-btn" style="border-color:#00ff88" onclick="Engine.initLevel('CYBER_PUNK')">Cyber Punk<br><span style="color:#00ff88;font-size:0.65rem">Insane - 160BPM</span></button>
                    <button class="lvl-btn" style="border-color:#0088ff" onclick="Engine.initLevel('MATRIX_SHIFT')">Matrix Shift<br><span style="color:#0088ff;font-size:0.65rem">Demon - 175BPM</span></button>
                    <button class="lvl-btn" style="border-color:#ffff00" onclick="Engine.initLevel('TITAN_OVERLORD')">Titan Overlord<br><span style="color:#ffff00;font-size:0.65rem">Boss Fight Matrix</span></button>
                </div>

                <div id="skin-shop-container">
                    <span class="shop-label">Matrix Skin Core:</span>
                    <div class="skin-node active" style="background: radial-gradient(circle, #fff 0%, #00ffcc 70%);" onclick="Cosmetics.selectSkin(0, this)"></div>
                    <div class="skin-node" style="background: radial-gradient(circle, #fff 0%, #ff0055 70%);" onclick="Cosmetics.selectSkin(1, this)"></div>
                    <div class="skin-node" style="background: radial-gradient(circle, #fff 0%, #7000ff 70%);" onclick="Cosmetics.selectSkin(2, this)"></div>
                    <div class="skin-node" style="background: radial-gradient(circle, #fff 0%, #00ff88 70%);" onclick="Cosmetics.selectSkin(3, this)"></div>
                    <div class="skin-node" style="background: radial-gradient(circle, #fff 0%, #ffff00 70%);" onclick="Cosmetics.selectSkin(4, this)"></div>
                </div>

                <div class="instructions">
                    PRESS [SPACEBAR], [CLICK], OR [TAP] TO EXECUTE JUMP / RETRIGGER ATTEMPT<br>
                    HOLD TO ASCEND CONTINUOUSLY IN SHIP MODE (VEHICULAR PORTALS)<br>
                    INTERACT WITH ORBS IN MID-AIR FOR EXTRA KINETIC IMPULSE SHIFTS
                </div>
            </div>

            <!-- Dashboard Analytics Layer -->
            <div class="hud">
                <div id="stat-left">ATTEMPT 1</div>
                <div class="progress-container">
                    <div class="progress-bar"><div id="progress-fill"></div></div>
                    <div id="progress-percent">0%</div>
                </div>
                <div id="stat-right">TRACK: DISCONNECTED</div>
            </div>

            <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
            
            <div id="player">
                <div class="skin-wing left"></div>
                <div id="player-aura"></div>
                <div id="player-inner-core">
                    <div class="eye-scanner"></div>
                </div>
                <div class="skin-wing right"></div>
            </div>
            
            <div id="boss">
                <div class="boss-eye"><div class="boss-laser-core"></div></div>
            </div>
            
            <div id="obs-layer"></div>
            <div class="ceiling"></div>
            <div class="floor"><div class="floor-grid"></div></div>
        </div>
    </div>

    <script>
        // --- Web Audio Synthesizer Framework & Procedural Score Generator ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let ctx = null, masterBus = null, visualAnalyser = null;

        const Sound = {
            init() {
                if (ctx) return;
                try {
                    ctx = new AudioCtx();
                    masterBus = ctx.createGain();
                    masterBus.gain.setValueAtTime(0.12, ctx.currentTime);
                    
                    visualAnalyser = ctx.createAnalyser();
                    visualAnalyser.fftSize = 32;
                    
                    masterBus.connect(visualAnalyser);
                    visualAnalyser.connect(ctx.destination);
                } catch(e) {
                    console.error("Audio Context initialization vector failure", e);
                }
            },
            
            playJump() {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const nodeGain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.07);
                
                nodeGain.gain.setValueAtTime(0.14, ctx.currentTime);
                nodeGain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.07);
                
                osc.connect(nodeGain);
                nodeGain.connect(masterBus);
                osc.start();
                osc.stop(ctx.currentTime + 0.07);
            },
            
            playOrb() {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const nodeGain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                
                nodeGain.gain.setValueAtTime(0.18, ctx.currentTime);
                nodeGain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                
                osc.connect(nodeGain);
                nodeGain.connect(masterBus);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            },
            
            playPortal() {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const filter = ctx.createBiquadFilter();
                const nodeGain = ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(350, ctx.currentTime + 0.25);
                
                filter.type = 'lowpass';
                filter.Q.setValueAtTime(8, ctx.currentTime);
                filter.frequency.setValueAtTime(800, ctx.currentTime);
                
                nodeGain.gain.setValueAtTime(0.15, ctx.currentTime);
                nodeGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                
                osc.connect(filter);
                filter.connect(nodeGain);
                nodeGain.connect(masterBus);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.25);
            },
            
            playDeath() {
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const nodeGain = ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(20, ctx.currentTime + 0.4);
                
                nodeGain.gain.setValueAtTime(0.3, ctx.currentTime);
                nodeGain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                
                osc.connect(nodeGain);
                nodeGain.connect(masterBus);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            },
            
            playWin() {
                if (!ctx) return;
                const sequence = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                sequence.forEach((freq, index) => {
                    const osc = ctx.createOscillator();
                    const nodeGain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.08);
                    
                    nodeGain.gain.setValueAtTime(0.15, ctx.currentTime + index * 0.08);
                    nodeGain.gain.linearRampToValueAtTime(0.001, ctx.currentTime + index * 0.08 + 0.2);
                    
                    osc.connect(nodeGain);
                    nodeGain.connect(masterBus);
                    osc.start(ctx.currentTime + index * 0.08);
                    osc.stop(ctx.currentTime + index * 0.08 + 0.2);
                });
            },
            
            playBGM(trackId) {
                if (!ctx) return;
                this.stopBGM();
                let beatSequence = 0;
                
                const trackLibrary = {
                    'STEREO': { matrix: [261, 293, 329, 349, 392, 349, 329, 293], waves: 'square', tempo: 130 },
                    'TRACK':  { matrix: [196, 220, 246, 293, 329, 293, 246, 220], waves: 'square', tempo: 140 },
                    'POLAR':  { matrix: [146, 165, 174, 196, 220, 196, 174, 165], waves: 'sawtooth', tempo: 150 },
                    'CYBER':  { matrix: [110, 130, 146, 165, 110, 165, 146, 130], waves: 'sawtooth', tempo: 160 },
                    'BLAST':  { matrix: [220, 261, 293, 392, 329, 440, 392, 329], waves: 'sawtooth', tempo: 175 },
                    'OVERLORD': { matrix: [87, 98, 110, 87, 123, 110, 98, 73], waves: 'sawtooth', tempo: 180 }
                };

                const currentConfig = trackLibrary[trackId] || trackLibrary['STEREO'];
                const intervalDuration = (60 / currentConfig.tempo) * 1000 * 0.5;

                this.bgmTimerSequence = setInterval(() => {
                    if(!ctx) return;
                    const osc = ctx.createOscillator();
                    const subBass = ctx.createOscillator();
                    const filter = ctx.createBiquadFilter();
                    const nodeGain = ctx.createGain();
                    
                    osc.type = currentConfig.waves;
                    let primaryNote = currentConfig.matrix[beatSequence % currentConfig.matrix.length];
                    
                    if (Math.floor(beatSequence / 16) % 2 === 1) {
                        primaryNote *= 1.2; 
                    }
                    
                    osc.frequency.setValueAtTime(primaryNote, ctx.currentTime);
                    
                    subBass.type = 'sine';
                    subBass.frequency.setValueAtTime(primaryNote / 2, ctx.currentTime);
                    
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(1200, ctx.currentTime);
                    
                    nodeGain.gain.setValueAtTime(0.06, ctx.currentTime);
                    nodeGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (intervalDuration / 1000) * 0.95);
                    
                    osc.connect(filter);
                    subBass.connect(filter);
                    filter.connect(nodeGain);
                    nodeGain.connect(masterBus);
                    
                    osc.start();
                    subBass.start();
                    osc.stop(ctx.currentTime + (intervalDuration / 1000));
                    subBass.stop(ctx.currentTime + (intervalDuration / 1000));
                    
                    if (beatSequence % 4 === 0) {
                        this.playSynthesizedPercussion();
                    }
                    
                    beatSequence++;
                }, intervalDuration);
            },
            
            playSynthesizedPercussion() {
                if(!ctx) return;
                const bufferSize = ctx.sampleRate * 0.04;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const outputData = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    outputData[i] = Math.random() * 2 - 1;
                }
                
                const noiseNode = ctx.createBufferSource();
                noiseNode.buffer = buffer;
                
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(7000, ctx.currentTime);
                
                const nodeGain = ctx.createGain();
                nodeGain.gain.setValueAtTime(0.02, ctx.currentTime);
                nodeGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
                
                noiseNode.connect(filter);
                filter.connect(nodeGain);
                nodeGain.connect(masterBus);
                noiseNode.start();
            },
            
            stopBGM() {
                if (this.bgmTimerSequence) {
                    clearInterval(this.bgmTimerSequence);
                    this.bgmTimerSequence = null;
                }
            }
        };

        // --- Core Execution Game Engine Architectural Design ---
        const Engine = {

            // Control Gates
            inputActive: false,
            
            init() {
                this.domLayer = document.getElementById('engine-layer');
                this.domPlayer = document.getElementById('player');
                this.domObsLayer = document.getElementById('obs-layer');
                this.domOverlay = document.getElementById('menu-overlay');
                this.domFill = document.getElementById('progress-fill');

                this.domStatRight = document.getElementById('stat-right');
                
                this.setupControls();
                window.requestAnimationFrame((t) => this.tick(t));
            },

            setupControls() {
                const triggerInputStart = (e) => {
                    if (e.repeat) return;
                    if (!this.running && this.domOverlay.style.opacity === '0') return; 
                    this.inputActive = true;
                    this.executeJumpShift();
                };

                const triggerInputEnd = () => {
                    this.inputActive = false;
                };

                // Keyboard Controls
                window.addEventListener('keydown', (e) => { if(e.code === 'Space') { triggerInputStart(e); e.preventDefault(); } });
                window.addEventListener('keyup', (e) => { if(e.code === 'Space') triggerInputEnd(); });
                
                // Mouse Controls
                this.domLayer.addEventListener('mousedown', triggerInputStart);
                window.addEventListener('mouseup', triggerInputEnd);

                // Touch Controls - Enhanced with button detection
                this.domLayer.addEventListener('touchstart', (e) => {
                    // Check if touch target is a button or interactive element
                    const touch = e.touches[0];
                    const element = document.elementFromPoint(touch.clientX, touch.clientY);
                    
                    if (element && (element.classList.contains('lvl-btn') || element.classList.contains('skin-node') || element.closest('.lvl-btn') || element.closest('.skin-node'))) {
                        // Allow button/skin interaction
                        return;
                    }
                    
                    e.preventDefault();
                    e.stopPropagation();
                    triggerInputStart(e);
                }, {passive: false});
                
                this.domLayer.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    triggerInputEnd();
                }, {passive: false});
                
                this.domLayer.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    triggerInputEnd();
                }, {passive: false});

                // Prevent scrolling on the game container
                document.addEventListener('touchmove', (e) => {
                    if (e.target === this.domLayer || this.domLayer.contains(e.target)) {
                        if (!e.target.classList.contains('lvl-btn') && !e.target.classList.contains('skin-node')) {
                            e.preventDefault();
                        }
                    }
                }, {passive: false});

                // Button click handlers for touch
                document.querySelectorAll('.lvl-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();

                    btn.addEventListener('touchstart', function(e) {

                    btn.addEventListener('touchend', function(e) {

                this.mapX = 0;
                this.speed = blueprint.speed;

                this.currentRotation = 0;

                document.querySelector('.ceiling').style.display = (this.mode === 'ship') ? 'block' : 'none';

                // Instantiation / Clear Operations
                this.domObsLayer.innerHTML = '';
                this.projectiles = [];
                this.obstacles = [];
                
                // Build Architectural Map Node Database
                blueprint.map.forEach((node, idx) => {
                    let obj = { ...node, id: idx, triggered: false };
                    
                    let el = document.createElement('div');
                    el.className = `obstacle ${node.t}`;
                    
                    if(node.t === 'spike') {
                        obj.w = 40; obj.h = 40;

                        obj.y = node.y || 190;

                    }
                    
                    el.style.width = `${obj.w}px`;
                    el.style.height = `${obj.h}px`;
                    el.style.left = `${obj.x}px`;
                    
                    if (node.t === 'spike-down' || (node.y && node.t !== 'spike' && node.t !== 'b')) {
                        el.style.bottom = `${obj.y}px`;
                    } else {
                        el.style.bottom = `${obj.y}px`;
                    }
                    
                    this.domObsLayer.appendChild(el);

                    this.obstacles.push(obj);

                const bossBar = document.getElementById('boss-hp-bar');

            executeJumpShift() {
                if (this.mode === 'cube' && this.isGrounded) {
                    this.pVelocity = this.jumpForce;
                    this.isGrounded = false;
                    Sound.playJump();
                    this.createSpawnExplosion(180, this.pY + 19, '#fff');
                }
                
                // Airborne Ambient Mid-Air Interaction Vector Probe
                if (!this.isGrounded) {
                    this.obstacles.forEach(obj => {
                        if ((obj.t === 'o' || obj.t === 'o-dash') && !obj.triggered) {
                            let pLeft = 160, pRight = 160 + this.pSize;
                            let pBottom = this.pY, pTop = this.pY + this.pSize;
                            let oLeft = obj.x - this.mapX, oRight = oLeft + obj.w;
                            let oBottom = obj.y, oTop = oBottom + obj.h;

                            // Expansive Tolerant Proximity Capture Zone
                            if (pRight >= oLeft - 25 && pLeft <= oRight + 25 && pTop >= oBottom - 25 && pBottom <= oTop + 25) {
                                obj.triggered = true;
                                obj.dom.style.opacity = '0.2';
                                Sound.playOrb();
                                this.createSpawnExplosion(obj.x - this.mapX + 16, obj.y + 16, obj.t === 'o' ? '#ffbb00' : '#00ff66');
                                
                                if(obj.t === 'o') {
                                    this.pVelocity = this.jumpForce * 0.95;
                                } else {
                                    // Kinetic Forward Dash Impulse Core
                                    this.mapX += 90;
                                    this.pVelocity = this.jumpForce * 0.4;
                                }
                            }
                        }
                    });
                }
            },

            processPhysicsEngine() {
                if (this.mode === 'cube') {
                    // Standard Platform Gravity Loop
                    this.pVelocity += this.gravity;
                    this.pY += this.pVelocity;
                    
                    // Base Ground Boundary Check
                    if (this.pY <= 90) {
                        this.pY = 90;
                        this.pVelocity = 0;
                        if (!this.isGrounded) {
                            this.isGrounded = true;
                            // Reset angular mesh snap to grid increments
                            this.currentRotation = Math.round(this.currentRotation / 90) * 90;
                        }
                    } else {
                        // Regular air rotation loop
                        this.currentRotation += 8.2;
                    }
                } else if (this.mode === 'ship') {
                    // Ship Fly Propulsion Mechanics
                    if (this.inputActive) {
                        this.pVelocity += this.shipAscentForce;
                    } else {
                        this.pVelocity += this.shipGravity;
                    }
                    
                    // Velocity Clamp
                    this.pVelocity = Math.max(-7, Math.min(7, this.pVelocity));
                    this.pY += this.pVelocity;
                    
                    // Cap Boundaries
                    if (this.pY <= 90) {
                        this.pY = 90;
                        this.pVelocity = 0;
                    }
                    if (this.pY >= 500 - this.pSize) {
                        this.pY = 500 - this.pSize;
                        this.pVelocity = 0;
                    }
                    
                    // Smooth Pitch Angle Tracking
                    this.currentRotation = this.pVelocity * 3.5;
                }
                
                this.domPlayer.style.bottom = `${this.pY}px`;
                this.domPlayer.style.transform = `rotate(${this.currentRotation}deg)`;
            },

            tick(timestamp) {
                if (this.running) {
                    this.mapX += this.speed;
                    this.processPhysicsEngine();
                    this.renderObstacleMatrix();
                    this.spawnTrailInfrastructure();
                    this.evaluateCollisionVectors();
                    
                    if (this.bossActive) {
                        this.processBossAI();
                    }
                    
                    this.updateAnalyticsDashboard();
                }
                
                this.processParticles();
                window.requestAnimationFrame((t) => this.tick(t));
            },

            renderObstacleMatrix() {
                this.obstacles.forEach(obj => {
                    let calculatedScreenPosition = obj.x - this.mapX;
                    obj.dom.style.left = `${calculatedScreenPosition}px`;
                });
                
                this.projectiles.forEach((proj, index) => {
                    proj.x -= proj.s;
                    proj.dom.style.left = `${proj.x}px`;
                });
                
                // Garbage Collection for Out of Bounds lasers
                this.projectiles = this.projectiles.filter(proj => {
                    if (proj.x < -50) {
                        proj.dom.remove();
                        return false;
                    }
                    return true;
                });
            },

            spawnTrailInfrastructure() {
                if (Math.random() > 0.4) {
                    let trail = document.createElement('div');
                    trail.className = 'trail-part';
                    trail.style.width = '10px';
                    trail.style.height = '10px';
                    trail.style.left = '170px';
                    trail.style.bottom = `${this.pY + 14}px`;
                    trail.style.opacity = '0.7';
                    
                    this.domLayer.appendChild(trail);
                    this.trailPool.push({ dom: trail, opacity: 0.7 });
                }
                
                this.trailPool.forEach(tp => {
                    tp.opacity -= 0.05;
                    tp.dom.style.opacity = tp.opacity;
                    let parsedCurrentLeft = parseFloat(tp.dom.style.left);
                    tp.dom.style.left = `${parsedCurrentLeft - this.speed}px`;
                });
                
                this.trailPool = this.trailPool.filter(tp => {
                    if(tp.opacity <= 0) {
                        tp.dom.remove();
                        return false;
                    }
                    return true;
                });
            },

            evaluateCollisionVectors() {
                let pLeft = 160, pRight = 160 + this.pSize;
                let pBottom = this.pY, pTop = this.pY + this.pSize;

                // Loop through environment blocks, spikes, and portals
                for (let i = 0; i < this.obstacles.length; i++) {
                    let obj = this.obstacles[i];
                    let oLeft = obj.x - this.mapX, oRight = oLeft + obj.w;
                    let oBottom = obj.y, oTop = oBottom + obj.h;

                    // AABB Collision Detect
                    if (pRight > oLeft && pLeft < oRight && pTop > oBottom && pBottom < oTop) {
                        
                        // Handle Mode Shift Portals
                        if (obj.t === 'p' && this.mode !== 'ship') {
                            this.mode = 'ship';
                            document.querySelector('.ceiling').style.display = 'block';
                            this.updatePlayerSkinState();
                            Sound.playPortal();
                            continue;
                        }
                        if (obj.t === 'r' && this.mode !== 'cube') {
                            this.mode = 'cube';
                            document.querySelector('.ceiling').style.display = 'none';
                            this.updatePlayerSkinState();
                            Sound.playPortal();
                            continue;
                        }

                        // Skip processing for collectible orbs or portals inside this thread
                        if (obj.t === 'o' || obj.t === 'o-dash' || obj.t === 'p' || obj.t === 'r') continue;

                        // SOLID BLOCK LANDING LOGIC
                        if (obj.t === 'b') {
                            // Calculate depth penetration from all directions to solve vector entry
                            let overlapLeft = pRight - oLeft;
                            let overlapRight = oRight - pLeft;
                            let overlapTop = oTop - pBottom;
                            let overlapBottom = pTop - oBottom;

                            // Find the shallowest intersection axis
                            let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

                            if (minOverlap === overlapTop && this.pVelocity <= 0) {
                                // Player landed safely on top of the block
                                this.pY = oTop;
                                this.pVelocity = 0;
                                this.isGrounded = true;
                                this.currentRotation = Math.round(this.currentRotation / 90) * 90;
                                return; // Safe landing escape path override
                            } else if (minOverlap === overlapBottom && this.mode === 'ship') {
                                // Under-face crash protection logic loop for vehicular mode
                                this.triggerDiagnosticCrash();
                                return;
                            } else if (minOverlap === overlapLeft) {
                                // Direct frontal impact into the vertical left wall of the block
                                this.triggerDiagnosticCrash();
                                return;
                            }
                        } else {
                            // Spikes are universally fatal on contact
                            this.triggerDiagnosticCrash();
                            return;
                        }
                    }
                }

                // Laser Projectile Matrix Collisions Loop
                for (let i = 0; i < this.projectiles.length; i++) {
                    let proj = this.projectiles[i];
                    if (proj.x < pRight && proj.x + 24 > pLeft && proj.y < pTop && proj.y + 8 > pBottom) {
                        this.triggerDiagnosticCrash();
                        return;
                    }
                }
            },

            triggerDiagnosticCrash() {
                this.running = false;
                Sound.stopBGM();
                Sound.playDeath();
                this.createSpawnExplosion(180, this.pY + 19, '#ff0055');
                this.attempt++;
                
                setTimeout(() => {
                    this.restartSimulation();
                }, 800);
            },

            processBossAI() {
                this.bossTimer++;
                const bossEl = document.getElementById('boss');
                
                // Track player vertical layout smoothly
                let deltaY = (this.pY - 50) - this.bossY;
                this.bossY += deltaY * 0.05;
                bossEl.style.bottom = `${this.bossY}px`;

                // Attack firing algorithm cycle
                if (this.bossTimer % 55 === 0) {
                    let projDom = document.createElement('div');
                    projDom.className = 'projectile';
                    projDom.style.left = '780px';
                    projDom.style.bottom = `${this.bossY + 180}px`;
                    this.domLayer.appendChild(projDom);
                    
                    this.projectiles.push({
                        dom: projDom,
                        x: 780,
                        y: this.bossY + 180,
                        s: this.speed + 3.5
                    });
                }

                // Automatic health deterioration matrix mapping over level length
                if (this.mapX > 4500 && this.bossActive) {
                    this.bossActive = false;
                    this.executeWinSequence();
                }
            },

            updateAnalyticsDashboard() {
                let totalLevelLength = 4800;
                if (LevelBlueprints[this.currentLvlId].isBoss) totalLevelLength = 4500;
                
                let completionPercent = Math.min(100, Math.floor((this.mapX / totalLevelLength) * 100));
                this.domFill.style.width = `${completionPercent}%`;
                this.domPercent.innerText = `${completionPercent}%`;

                if (completionPercent >= 100 && this.running) {
                    this.executeWinSequence();
                }
            },

            executeWinSequence() {
                this.running = false;
                Sound.stopBGM();
                Sound.playWin();
                
                setTimeout(() => {
                    this.domOverlay.style.opacity = '1';
                    this.domOverlay.style.pointerEvents = 'all';
                }, 1000);
            },

            createSpawnExplosion(x, y, color) {
                for (let i = 0; i < 16; i++) {
                    let p = document.createElement('div');
                    p.className = 'particle';
                    let size = Math.random() * 6 + 4;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    p.style.background = color;
                    p.style.left = `${x}px`;
                    p.style.bottom = `${y}px`;
                    this.domLayer.appendChild(p);

                    let angle = Math.random() * Math.PI * 2;
                    let velocity = Math.random() * 5 + 2;
                    this.particles.push({
                        dom: p,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        opacity: 1.0
                    });
                }
            },

            processParticles() {
                this.particles.forEach(p => {
                    let cLeft = parseFloat(p.dom.style.left);
                    let cBottom = parseFloat(p.dom.style.bottom);
                    
                    p.dom.style.left = `${cLeft + p.vx - (this.running ? this.speed * 0.3 : 0)}px`;
                    p.dom.style.bottom = `${cBottom + p.vy}px`;
                    
                    p.opacity -= 0.03;
                    p.dom.style.opacity = p.opacity;
                });

                this.particles = this.particles.filter(p => {
                    if (p.opacity <= 0) {
                        p.dom.remove();
                        return false;
                    }
                    return true;
                });
            }
        };

        // Initialize Architecture Core Engine Module upon Document Ready State
        window.onload = () => { Engine.init(); };
    </script>
</body>
